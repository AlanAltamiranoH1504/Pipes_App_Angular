<section class="mx-10 my-5">
  <h1 class="text-2xl font-semibold">Pipes No Comunes</h1>
</section>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
  <app-card-component title="i18nSelectPipe">
    <p>
      Saludos <span class="font-semibold text-amber-500">{{ client().name }}</span> es un placer
      invitarlo
    </p>

    <button
      (click)="changeClient()"
      class="btn bg-green-500 capitalize font-semibold text-black hover:bg-green-600 transition-colors duration-500"
    >
      Cambiar Cliente
    </button>
  </app-card-component>

  <!--  -->
  <app-card-component title="i18nPlural">
    <p>Actualmente hay {{ clients().length }} personas esperando</p>

    <button
      [disabled]="clients().length === 0"
      (click)="deleteClient()"
      class="btn bg-green-500 capitalize font-semibold text-black hover:bg-green-600 transition-colors duration-500"
    >
      Borrar Cliente
    </button>
  </app-card-component>

  <!--  -->
  <app-card-component title="Slice Pipe">
    <b>Original</b>
    <p class="text-primary">
      {{ clients().join(', ') }}
    </p>

    <b>Slice 0-2</b>
    <p class="text-primary">
      {{ clients() | slice: 0 : 2 }}
    </p>
  </app-card-component>

  <!--  -->
  <app-card-component title="Json Pipe">
    <pre class="text-primary">
        {{clients() | json}}
    </pre>

    <pre class="text-primary">{{client() | json}}</pre>

    <p class="text-primary">
        {{clients().join(", ")}}
    </p>
  </app-card-component>
</div>
